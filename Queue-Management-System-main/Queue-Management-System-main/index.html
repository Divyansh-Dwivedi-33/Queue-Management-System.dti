<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Queue Booking</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
width:450px;
padding:30px;
border-radius:20px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.3);
box-shadow:0 8px 32px rgba(0,0,0,0.25);

color:white;
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-box{
margin-bottom:15px;
}

label{
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;

border:none;
border-radius:10px;
outline:none;

background:rgba(255,255,255,0.25);
color:white;
}

input::placeholder{
color:#eee;
}

button{
width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:10px;

background:white;
color:#333;

font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:20px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.2);
text-align:center;
font-size:16px;
}

.support{
margin-top:15px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.15);
font-size:14px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Queue Booking System</h1>

<div class="input-box">
<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="text" id="phone" placeholder="Enter phone number">
</div>

<div class="input-box">
<label>Number of People</label>
<select id="people">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5+</option>
</select>
</div>

<div class="input-box">
<label>Preferred Time</label>
<input type="time" id="time">
</div>

<div class="input-box">
<label>Booking Service Charge (₹)</label>
<input type="number" id="serviceCost" placeholder="Example: 50">
</div>

<button onclick="bookQueue()">Book Queue</button>

<div class="result" id="result">
Waiting for booking...
</div>

<div class="support">
Technical Support Available<br>
📞 +91 9876543210<br>
📧 support@restaurantqueue.com
</div>

</div>

<script>

let token = 1;

function bookQueue(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let people=document.getElementById("people").value;
let time=document.getElementById("time").value;
let serviceCost=parseFloat(document.getElementById("serviceCost").value)||0;

if(name=="" || phone=="" || time==""){
alert("Please fill all details");
return;
}

document.getElementById("result").innerHTML=

"Booking Confirmed<br><br>" +
"Token Number: <b>"+token+"</b><br>" +
"Customer: "+name+"<br>" +
"People: "+people+"<br>" +
"Time: "+time+"<br><br>" +
"SMS Notification Sent ✔<br>" +
"<b>Total Booking Cost: ₹"+serviceCost+"</b>";

token++;

}

</script>

</body>
</html>
